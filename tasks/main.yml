---

- name: Create group(s)
  ansible.builtin.group:
    name: "{{ item.name }}"
    gid: "{{ item.gid | default(omit) }}"
  with_items: "{{ groups_to_create }}"
  tags:
    - configuration
    - groups
    - users

- name: Per-user group creation
  ansible.builtin.group:
    name: "{{ item.username }}"
    gid: "{{ item.gid | default(item.uid) | default(omit) }}"
  with_items: "{{ users }}"
  when: "'group' not in item and users_create_per_user_group"
  tags:
    - configuration
    - users

- name: Create user(s)
  ansible.builtin.user:
    name: "{{ item.username }}"
    append: "{{ item.append | default(omit) }}"
    comment: "{{ item.name if item.name is defined else '' }}"
    createhome: "{{ 'true' if users_create_homedirs else 'false' }}"
    generate_ssh_key: "{{ item.generate_ssh_key | default(omit) }}"
    group: "{{ item.group | default(item.username if users_create_per_user_group else users_group) }}"
    groups: "{{ item.groups | join(',') if 'groups' in item else '' }}" # Empty string removes user from all secondary groups
    home: "{{ item.home | default('/home/' + item.username) }}"
    password: "{{ item.password if item.password is defined else '!' }}"
    shell: "{{ item.shell if item.shell is defined else users_default_shell }}"
    uid: "{{ item.uid | default(omit) }}"
    update_password: "{{ item.update_password | default(omit) }}"
  with_items: "{{ users }}"
  tags:
    - configuration
    - users

- name: SSH keys
  ansible.posix.authorized_key:
    user: "{{ item.0.username }}"
    key: "{{ item.1 }}"
    path: "{{ item.0.home | default('/home/' + item.0.username) }}/{{ authorized_keys_file }}"
  with_subelements:
    - "{{ users }}"
    - ssh_key
    - skip_missing: true
  tags:
    - configuration
    - users

- name: Setup user profiles
  ansible.builtin.blockinfile:
    block: "{{ item.profile }}"
    dest: "{{ item.home | default('/home/' + item.username) }}/.profile"
    owner: "{{ item.username }}"
    group: "{{ item.group | default(item.username if users_create_per_user_group else users_group) }}"
    mode: "0644"
    create: true
  when: users_create_homedirs and item.profile is defined
  with_items: "{{ users }}"

- name: Create sudoers include
  ansible.builtin.template:
    src: pwless_sudo.j2
    dest: "/etc/sudoers.d/{{ item.username }}"
    mode: "0440"
    owner: root
    group: root
    validate: /usr/sbin/visudo -cf %s
  with_items: "{{ users }}"
  when: passwordless_sudo in item and item.passwordless_sudo
  tags:
    - configuration
    - users

- name: Remove user(s)
  ansible.builtin.user:
    name: "{{ item.username }}"
    force: "{{ item.force | default(omit) }}"
    remove: "{{ item.remove | default(omit) }}"
    state: absent
  with_items: "{{ users_deleted }}"
  tags:
    - configuration
    - users

- name: Remove user(s) from /etc/sudoers.d
  ansible.builtin.file:
    path: "/etc/sudoers.d/{{ item.username }}"
    state: absent
  with_items: "{{ users_deleted }}"
  tags:
    - configuration
    - users

- name: Delete primary user group
  ansible.builtin.group:
    name: "{{ item.username }}"
    state: absent
  with_items: "{{ users_deleted }}"
  when: users_create_per_user_group
  tags:
    - configuration
    - users
